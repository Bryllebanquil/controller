preBuild:
  - apt-get update
  - apt-get install -y portaudio19-dev libasound2-dev libportaudio2 libportaudiocpp0
  - apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1
  - apt-get install -y libgtk-3-dev libavcodec-dev libavformat-dev libswscale-dev libv4l-dev
  - apt-get install -y libxvidcore-dev libx264-dev libjpeg-dev libpng-dev libtiff-dev libatlas-base-dev
  - apt-get install -y gfortran libhdf5-dev libhdf5-serial-dev libhdf5-103 libqtgui4 libqtwebkit4 libqt4-test
  - apt-get install -y python3-dev python3-pip python3-venv
  - apt-get install -y libx11-dev libxtst-dev libxrandr-dev libxinerama-dev libxi-dev
  - apt-get install -y libasound2-dev libpulse-dev

services:
  - type: web
    name: agent-controller
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 controller:app --bind 0.0.0.0:$PORT
    plan: free
